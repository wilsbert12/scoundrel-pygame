name: Build Executables

on:
  push:
    tags:
      - 'v*'  # triggers on tags like v1.0, v1.2.3 etc.

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-13, macos-14, windows-latest]
        include:
          - os: macos-13
            label: mac-intel
          - os: macos-14
            label: mac-apple-silicon
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build executable (Mac)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onedir --windowed -y --add-data "assets:assets" main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onedir --windowed -y --add-data "assets;assets" main.py

      - name: Zip build output (Mac)
        if: runner.os != 'Windows'
        run: |
          cd dist && zip -r ../scoundrel-${{ matrix.label }}.zip main.app

      - name: Zip build output (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist && Compress-Archive -Path main -DestinationPath ../scoundrel-${{ matrix.label }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: scoundrel-${{ matrix.label }}.zip
